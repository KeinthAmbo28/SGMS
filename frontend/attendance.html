<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Powerhouse Gym | Attendance</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <img src="/assets/img/powerhouse-gym-logo.png" alt="Powerhouse Gym logo" />
          <span>POWERHOUSE GYM</span>
        </div>
        <nav class="nav">
          <a data-nav="dashboard" href="/adminDashboard.html"><i class="fa-solid fa-house"></i>Dashboard</a>
          <a data-nav="members" href="/members.html"><i class="fa-solid fa-users"></i>Members</a>
          <a data-nav="trainers" href="/trainers.html"><i class="fa-solid fa-user-tie"></i>Trainers</a>
          <a data-nav="attendance" href="/attendance.html"><i class="fa-solid fa-clipboard-check"></i>Attendance</a>
          <a data-nav="payments" href="/payments.html"><i class="fa-solid fa-credit-card"></i>Payments</a>
          <a data-nav="reports" href="/reports.html"><i class="fa-solid fa-chart-column"></i>Reports</a>
          <a data-nav="settings" href="/settings.html"><i class="fa-solid fa-gear"></i>Settings</a>
        </nav>
        <div class="sidebar-spacer"></div>
        <div class="logout">
          <button id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i>Logout</button>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div class="page-title">ATTENDANCE</div>
          <div class="user-pill"><div id="userLabel">Admin</div><div class="avatar"></div></div>
        </div>

        <div class="grid-panels" style="grid-template-columns: 1fr">
          <div class="panel-toolbar">
            <button class="btn btn-primary" id="printAttendanceBtn"><i class="fa-solid fa-print"></i>Print</button>
          </div>
          <section class="panel printable">
            <h3 style="text-align:left; margin:0 0 12px">Recent Attendance</h3>
            <div style="overflow:auto; margin-top:10px">
              <table>
                <thead>
                  <tr>
                    <th>Member</th>
                    <th>Check-in</th>
                    <th>Check-out</th>
                  </tr>
                </thead>
                <tbody id="tbody"></tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script type="module" src="/assets/js/attendance.js"></script>
  </body>
</html>
