<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Powerhouse Gym | Login</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-left">
          <img class="logo" src="/assets/img/powerhouse-gym-logo.png" alt="Powerhouse Gym logo">
          <h1>Powerhouse Gym Management System</h1>
          <p class="small" style="margin-top: 14px">
            Default admin: <b>admin</b> / <b>admin123</b>
          </p>
        </div>
        <div class="login-right">
          <h2>Login</h2>
          <div class="muted small">Use your registered account.</div>

          <label for="username">Username</label>
          <input id="username" placeholder="Enter username" autocomplete="username" />

          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" />

          <div class="actions">
            <button class="btn btn-primary" id="loginBtn">Sign in</button>
            <button class="btn btn-ghost" id="fillBtn" type="button">Fill admin</button>
          </div>

          <div class="error" id="errBox"></div>
        </div>
      </div>
    </div>

    <script type="module">
      import { api, setToken, getToken, clearToken } from "/assets/js/app.js";

      const errBox = document.getElementById("errBox");
      const username = document.getElementById("username");
      const password = document.getElementById("password");

      // Check existing session and redirect by role
      async function redirectBasedOnRole() {
        const token = getToken();
        if (!token) return;

        try {
          const me = await api("/api/me"); // expects { user: { role: "admin"|"member" } }

          if (me.user.role === "admin") {
            window.location.href = "/adminDashboard.html";
          } else if (me.user.role === "member") {
            window.location.href = "/memberDashboard.html";
          } else {
            clearToken(); // unknown role
          }
        } catch {
          clearToken();
        }
      }
      redirectBasedOnRole();

      // Fill default admin credentials
      document.getElementById("fillBtn").addEventListener("click", () => {
        username.value = "admin";
        password.value = "admin123";
      });

      // Login function
      async function login() {
        errBox.style.display = "none";

        try {
          const data = await api("/api/auth/login", {
            method: "POST",
            auth: false,
            body: {
              username: username.value.trim(),
              password: password.value
            }
          });

          // Save token
          setToken(data.token);

          // Redirect based on role
          if (data.user.role === "admin") {
            window.location.href = "/adminDashboard.html";
          } else if (data.user.role === "member") {
            window.location.href = "/memberDashboard.html";
          } else {
            throw new Error("Unknown account type");
          }
        } catch (e) {
          errBox.textContent = e.message || "Login failed";
          errBox.style.display = "block";
        }
      }

      document.getElementById("loginBtn").addEventListener("click", login);
      password.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") login();
      });
    </script>
  </body>
</html>
