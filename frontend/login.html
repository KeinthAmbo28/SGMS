<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Powerhouse Gym | Login</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>

<body>
<div class="login-wrap">
  <div class="login-card">

    <!-- LEFT -->
    <div class="login-left">
      <img class="logo" src="/assets/img/powerhouse-gym-logo.png">
      <h1>Powerhouse Gym Management System</h1>
    </div>

    <!-- RIGHT -->
    <div class="login-right">
      <h2>Login</h2>
      <div class="muted small">Use your registered account.</div>

      <label>Username</label>
      <input id="username" placeholder="Enter username" />

      <label>Password</label>
      <input id="password" type="password" placeholder="Enter password" />

      <div class="actions">
        <button class="btn btn-primary" id="loginBtn">Sign in</button>
        <button class="btn btn-ghost" id="createMemberBtn">Create Member Account</button>
      </div>

      <div class="error" id="errBox"></div>
    </div>

  </div>
</div>

<script type="module">
import { api, setToken, getToken, clearToken } from "/assets/js/app.js";

const errBox = document.getElementById("errBox");

// AUTO LOGIN
(async () => {
  const token = getToken();
  if (!token) return;

  try {
    const me = await api("/api/me");

    if (me.user.role === "admin") {
      window.location.href = "/adminDashboard.html";
    } else {
      window.location.href = "/memberDashboard.html";
    }
  } catch {
    clearToken();
  }
})();

// LOGIN
document.getElementById("loginBtn").addEventListener("click", async () => {
  errBox.textContent = "";

  try {
    const data = await api("/api/auth/login", {
      method: "POST",
      auth: false,
      body: {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value
      }
    });

    setToken(data.token);

    if (data.user.role === "admin") {
      window.location.href = "/adminDashboard.html";
    } else {
      window.location.href = "/memberDashboard.html";
    }

  } catch (e) {
    errBox.textContent = e.message || "Login failed";
  }
});

// GO TO REGISTER
document.getElementById("createMemberBtn")
  .addEventListener("click", () => {
    window.location.href = "/register.html";
});
</script>
</body>
</html>
