<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Powerhouse Gym | Login</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-left">
          <img class="logo" src="/assets/img/powerhouse-gym-logo.png" alt="Powerhouse Gym logo">
          <h1>Powerhouse Gym Management System</h1>
        </div>
        <div class="login-right">
          <h2>Login</h2>
          <div class="muted small">Use your registered account.</div>

          <label for="username">Username</label>
          <input id="username" placeholder="Enter username" autocomplete="username" />

          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" />

          <div class="actions">
            <button class="btn btn-primary" id="loginBtn">Sign in</button>
            <button class="btn btn-ghost" id="createMemberBtn" type="button">Create Member Account</button>
          </div>

          <div class="error" id="errBox"></div>
        </div>
      </div>
    </div>

    <script type="module">
      import { api, setToken, getToken, clearToken } from "/assets/js/app.js";

      const errBox = document.getElementById("errBox");
      const username = document.getElementById("username");
      const password = document.getElementById("password");

      // Redirect if already logged in
      async function redirectBasedOnRole() {
        const token = getToken();
        if (!token) return;
        try {
          const me = await api("/api/me");
          if (me.user.role === "admin") {
            window.location.href = "/adminDashboard.html";
          } else {
            window.location.href = "/memberDashboard.html";
          }
        } catch {
          clearToken();
        }
      }
      redirectBasedOnRole();

      // Go to member registration page
      document.getElementById("createMemberBtn").addEventListener("click", () => {
        window.location.href = "/memberLogin.html";
      });

      async function login() {
        errBox.style.display = "none";
        try {
          const data = await api("/api/auth/login", {
            method: "POST",
            auth: false,
            body: { username: username.value.trim(), password: password.value }
          });

          setToken(data.token);

          // Redirect based on role
          if (data.user.role === "admin") {
            window.location.href = "/adminDashboard.html";
          } else {
            window.location.href = "/memberDashboard.html";
          }
        } catch (e) {
          errBox.textContent = e.message || "Login failed";
          errBox.style.display = "block";
        }
      }

      document.getElementById("loginBtn").addEventListener("click", login);
      password.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") login();
      });
    </script>
  </body>
</html>
