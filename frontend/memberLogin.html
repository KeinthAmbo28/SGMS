<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Powerhouse Gym | Member Login / Register</title>
<link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    
    <!-- LEFT SIDE (Brand Info) -->
    <div class="login-left">
      <img class="logo" src="/assets/img/powerhouse-gym-logo.png" alt="Powerhouse Gym logo">
      <h1>Powerhouse Gym Management System</h1>
      <p>Login or create your member account to access the system.</p>
    </div>

    <!-- RIGHT SIDE (Login / Register Form) -->
    <div class="login-right">
      
      <!-- LOGIN FORM -->
      <div id="loginForm">
        <h2>Login</h2>
        <label>Username</label>
        <input id="username" placeholder="Enter username">
        <label>Password</label>
        <input id="password" type="password" placeholder="Enter password">
        <div class="actions">
          <button id="loginBtn" class="btn btn-primary">Sign In</button>
          <button id="showRegisterBtn" class="btn btn-ghost">Create Member Account</button>
        </div>
        <div id="loginErr" class="error"></div>
      </div>

      <!-- REGISTER FORM -->
      <div id="registerForm" style="display:none;">
        <h2>Register</h2>
        <label>Full Name</label>
        <input id="fullName" placeholder="Enter full name">
        <label>Username</label>
        <input id="regUsername" placeholder="Create username">
        <label>Password</label>
        <input id="regPassword" type="password" placeholder="Min 6 characters">
        <label>Membership Type</label>
        <select id="membershipType">
          <option value="monthly">Monthly</option>
          <option value="annual">Annual</option>
        </select>
        <label>Phone</label>
        <input id="phone" placeholder="09xx...">
        <label>Email (optional)</label>
        <input id="email" placeholder="name@email.com">
        <div class="actions">
          <button id="registerBtn" class="btn btn-primary">Create Account</button>
          <button id="showLoginBtn" class="btn btn-ghost">Back to Login</button>
        </div>
        <div id="regErr" class="error"></div>
        <div id="regSuccess" class="success"></div>
      </div>

    </div>
  </div>
</div>

<script type="module">
import { api, setToken, getToken } from "/assets/js/app.js";

// If already logged in, redirect
if(getToken()) window.location.href="/memberDashboard.html";

// Show/hide forms
const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");
document.getElementById("showRegisterBtn").addEventListener("click", ()=>{
  loginForm.style.display="none"; registerForm.style.display="block";
});
document.getElementById("showLoginBtn").addEventListener("click", ()=>{
  loginForm.style.display="block"; registerForm.style.display="none";
});

// LOGIN
const loginErr = document.getElementById("loginErr");
document.getElementById("loginBtn").addEventListener("click", async ()=>{
  loginErr.textContent = "";
  try{
    const res = await api("/api/login", {
      method: "POST",
      auth: false,
      body: {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value
      }
    });
    if(res.token){
      setToken(res.token);
      window.location.href="/memberDashboard.html";
    } else loginErr.textContent = "Login failed";
  } catch(e){
    loginErr.textContent = e.message || "Login failed";
  }
});

// REGISTRATION
const regErr = document.getElementById("regErr");
const regSuccess = document.getElementById("regSuccess");
document.getElementById("registerBtn").addEventListener("click", async ()=>{
  regErr.textContent = ""; regSuccess.textContent = "";
  try{
    const res = await api("/api/member/register", {
      method: "POST",
      auth: false,
      body: {
        full_name: document.getElementById("fullName").value.trim(),
        username: document.getElementById("regUsername").value.trim(),
        password: document.getElementById("regPassword").value,
        membership_type: document.getElementById("membershipType").value,
        phone: document.getElementById("phone").value.trim() || null,
        email: document.getElementById("email").value.trim() || null
      }
    });
    if(res.token){
      setToken(res.token);
      regSuccess.textContent = "Account created! Redirecting...";
      setTimeout(()=>window.location.href="/memberDashboard.html", 1000);
    } else regErr.textContent = "Registration failed";
  } catch(e){
    regErr.textContent = e.message || "Registration failed";
  }
});
</script>

</body>
</html>
