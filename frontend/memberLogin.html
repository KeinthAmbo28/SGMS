<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Powerhouse Gym | Member Registration</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-left">
      <img class="logo" src="/assets/img/powerhouse-gym-logo.png" alt="Powerhouse Gym logo">
      <h1>Member Registration</h1>
      <p>Create your account to access the gym system.</p>
    </div>

    <div class="login-right">
      <h2>Register</h2>
      <div class="muted small">Create a new member account.</div>

      <label for="fullName">Full name</label>
      <input id="fullName" placeholder="Enter full name" />

      <div class="form-row">
        <div>
          <label for="username">Username</label>
          <input id="username" placeholder="Create a username" />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Min 6 characters" />
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="membershipType">Membership</label>
          <select id="membershipType">
            <option value="monthly">Monthly</option>
            <option value="annual">Annual</option>
          </select>
        </div>
        <div>
          <label for="phone">Phone</label>
          <input id="phone" placeholder="09xx..." />
        </div>
      </div>

      <label for="email">Email (optional)</label>
      <input id="email" placeholder="name@email.com" />

      <label for="profilePicture">Profile picture</label>
      <input id="profilePicture" type="file" accept="image/*" />

      <div id="profilePreview" style="display:none; margin-top:10px">
        <img id="profilePreviewImg" style="max-width:120px; border-radius:16px; border:1px solid #ddd;" />
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="registerBtn">Create account</button>
      </div>

      <div class="error" id="errBox"></div>
      <div class="success" id="successBox"></div>
    </div>
  </div>
</div>

<script type="module">
import { api, setToken, getToken } from "/assets/js/app.js";

const el = id => document.getElementById(id);
const errBox = el("errBox");
const successBox = el("successBox");

if(getToken()) window.location.href="/memberDashboard.html";

function showError(msg){ errBox.textContent = msg; successBox.textContent=""; }
function showSuccess(msg){ successBox.textContent = msg; errBox.textContent=""; }

async function register(){
  showError("");
  try{
    const res = await api("/api/member/register", {
      method:"POST",
      auth:false,
      body:{
        full_name: el("fullName").value.trim(),
        username: el("username").value.trim(),
        password: el("password").value,
        membership_type: el("membershipType").value,
        phone: el("phone").value.trim() || null,
        email: el("email").value.trim() || null
      }
    });

    setToken(res.token);
    showSuccess("Account created! Redirecting...");
    setTimeout(()=> window.location.href="/memberDashboard.html", 1000);

  } catch(e){
    showError(e.message || "Registration failed");
  }
}

el("registerBtn").addEventListener("click", register);
</script>
</body>
</html>
